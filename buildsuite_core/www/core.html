<!doctype html>
<html lang="en" dir="{{ boot.text_direction }}">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="{{ meta.description }}" />
		<title>{{ title }}</title>
		<link rel="icon" href="{{ favicon }}" />
		{% if frontend_assets %}
		{% for stylesheet in frontend_assets.styles %}
		<link rel="stylesheet" href="{{ stylesheet }}" />
		{% endfor %}
		{% endif %}
		<style>
			body {
				margin: 0;
				min-height: 100vh;
				background: #f5f7fb;
			}

			.noscript-shell {
				font-family: system-ui, sans-serif;
				padding: 32px;
				max-width: 960px;
				margin: 0 auto;
			}
		</style>
	</head>
	<body>
		<div id="app"></div>
		{% if not frontend_assets %}
		<main class="noscript-shell">
			<h1>BuildSuite Core</h1>
			<p>Frontend assets have not been built yet. Run the frontend build to mount the app here.</p>
		</main>
		{% endif %}
		<noscript>
			<main class="noscript-shell">
				<h1>BuildSuite Core</h1>
				<p>JavaScript is required to load the BuildSuite frontend.</p>
			</main>
		</noscript>

		<script>
			{% for key in boot %}
			window["{{ key }}"] = {{ boot[key] | tojson }};
			{% endfor %}
			document.documentElement.lang = window.lang || 'en';
		</script>
		{% if frontend_assets %}
		<script type="module" src="{{ frontend_assets.entry }}"></script>
		{% endif %}
	</body>
</html>
